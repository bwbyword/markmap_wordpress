name: Plugin Checks

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  sanity:
    name: Plugin sanity checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none

      - name: Lint PHP
        run: php -l interactive-markdown-mindmap.php

      - name: Check JavaScript syntax
        run: |
          node --check assets/interactive-markdown-mindmap.js
          node --check assets/vendor/d3.min.js
          node --check assets/vendor/markmap-lib.iife.js
          node --check assets/vendor/markmap-view.js

      - name: Check bundled executable assets
        run: |
          if grep -R -n -E 'cdn\.jsdelivr|unpkg\.com|esm\.sh|https://cdn|http://cdn' interactive-markdown-mindmap.php assets; then
            echo "Unexpected public CDN reference found in executable plugin files."
            exit 1
          fi
